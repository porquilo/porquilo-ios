name: Porquilo
options:
  bundleIdPrefix: com.porquilo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
targets:
  Porquilo:
    type: application
    platform: iOS
    sources: Sources/Porquilo
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.porquilo.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Porquilo uses the camera to scan pairing QR codes."
  PorquiloTests:
    type: bundle.unit-test
    platform: iOS
    sources: Tests/PorquiloTests
    dependencies:
      - target: Porquilo
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
